<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Site Burst Renderer</title>
<style>
  :root {
    --bg: #0a0e17;
    --panel: #141a28;
    --border: #1e2a3a;
    --text: #e0e6f0;
    --dim: #6b7a90;
    --cloud: #3b82f6;
    --onprem: #f59e0b;
    --accent: #22d3ee;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  .header {
    padding: 1.2rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 {
    font-size: 1.3rem;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .header h1 span { color: var(--accent); }
  .header-right {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    font-size: 0.85rem;
    color: var(--dim);
  }
  .legend {
    display: flex;
    gap: 1rem;
    align-items: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .main {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 0;
    height: calc(100vh - 60px);
  }
  .canvas-area {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
    overflow: hidden;
  }
  #fractal-canvas {
    border: 1px solid var(--border);
    border-radius: 8px;
    image-rendering: pixelated;
    cursor: grab;
  }
  #fractal-canvas:active { cursor: grabbing; }
  .zoom-hint {
    position: absolute;
    bottom: 1rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.7rem;
    color: var(--dim);
    background: var(--panel);
    padding: 0.3rem 0.8rem;
    border-radius: 12px;
    border: 1px solid var(--border);
    pointer-events: none;
    opacity: 0.7;
  }
  .sidebar {
    border-left: 1px solid var(--border);
    padding: 1.5rem;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 1.2rem;
  }
  .card-title {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--dim);
    margin-bottom: 0.8rem;
  }
  .progress-bar-outer {
    width: 100%;
    height: 24px;
    background: var(--bg);
    border-radius: 12px;
    overflow: hidden;
    position: relative;
  }
  .progress-bar-inner {
    height: 100%;
    border-radius: 12px;
    background: linear-gradient(90deg, var(--cloud), var(--accent));
    transition: width 0.3s ease;
    min-width: 0;
  }
  .progress-label {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 600;
    color: white;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
  }
  .stat {
    text-align: center;
    padding: 0.5rem;
    background: var(--bg);
    border-radius: 6px;
  }
  .stat-value {
    font-size: 1.5rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .stat-label {
    font-size: 0.65rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .site-card {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding: 0.7rem;
    background: var(--bg);
    border-radius: 6px;
    margin-bottom: 0.5rem;
  }
  .site-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }
  .site-info { flex: 1; }
  .site-name { font-size: 0.85rem; font-weight: 600; }
  .site-detail { font-size: 0.7rem; color: var(--dim); }
  .site-count {
    font-size: 1.2rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .throughput-chart {
    width: 100%;
    height: 100px;
    position: relative;
  }
  #throughput-canvas {
    width: 100%;
    height: 100%;
  }
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.25rem 0.6rem;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 500;
  }
  .status-badge.waiting {
    background: rgba(107,122,144,0.2);
    color: var(--dim);
  }
  .status-badge.running {
    background: rgba(34,211,238,0.15);
    color: var(--accent);
  }
  .status-badge.complete {
    background: rgba(34,197,94,0.15);
    color: #22c55e;
  }
  .pulse {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
<div class="header">
  <h1><span>ACTIVATE</span> Multi-Site Burst Renderer</h1>
  <div class="header-right">
    <div class="legend" id="header-legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:var(--dim)"></div>
        <span>Waiting for sites...</span>
      </div>
    </div>
    <div id="status-badge" class="status-badge waiting">
      <div class="pulse" style="background:currentColor"></div>
      Waiting
    </div>
  </div>
</div>

<div class="main">
  <div class="canvas-area">
    <canvas id="fractal-canvas"></canvas>
    <div class="zoom-hint">Scroll to zoom &middot; Drag to pan &middot; Double-click to reset</div>
  </div>
  <div class="sidebar">
    <!-- Progress -->
    <div class="card">
      <div class="card-title">Progress</div>
      <div class="progress-bar-outer">
        <div id="progress-bar" class="progress-bar-inner" style="width:0%"></div>
        <div id="progress-label" class="progress-label">0 / 0 tiles</div>
      </div>
    </div>

    <!-- Stats -->
    <div class="card">
      <div class="card-title">Statistics</div>
      <div class="stat-grid">
        <div class="stat">
          <div class="stat-value" id="stat-elapsed">0s</div>
          <div class="stat-label">Elapsed</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-tps">0</div>
          <div class="stat-label">Tiles/sec</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-avg-ms">0</div>
          <div class="stat-label">Avg ms/tile</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-total">0</div>
          <div class="stat-label">Total Tiles</div>
        </div>
      </div>
    </div>

    <!-- Sites -->
    <div class="card">
      <div class="card-title">Compute Sites</div>
      <div id="sites-container">
        <div class="site-card" style="opacity: 0.4;">
          <div class="site-icon" style="background:rgba(59,130,246,0.15); color:var(--cloud);">&#9729;</div>
          <div class="site-info">
            <div class="site-name">Waiting for tiles...</div>
            <div class="site-detail">Sites appear as tiles arrive</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Throughput -->
    <div class="card">
      <div class="card-title">Throughput (tiles/sec)</div>
      <div class="throughput-chart">
        <canvas id="throughput-canvas"></canvas>
      </div>
    </div>
  </div>
</div>

<script>
const SITE_COLORS = {};
const COLOR_PALETTE = ['#3b82f6', '#f59e0b', '#22c55e', '#ef4444', '#a855f7', '#ec4899'];
let colorIdx = 0;
function getSiteColor(siteId) {
  if (!SITE_COLORS[siteId]) {
    SITE_COLORS[siteId] = COLOR_PALETTE[colorIdx % COLOR_PALETTE.length];
    colorIdx++;
  }
  return SITE_COLORS[siteId];
}

function updateHeaderLegend() {
  const legend = document.getElementById('header-legend');
  const siteIds = Object.keys(siteStats);
  if (siteIds.length === 0) return;
  legend.innerHTML = siteIds.map(siteId => {
    const s = siteStats[siteId];
    const color = getSiteColor(siteId);
    const label = s.cluster_name || siteId;
    return `<div class="legend-item">
      <div class="legend-dot" style="background:${color}"></div>
      <span>${label}</span>
    </div>`;
  }).join('');
}

// State
let gridSize = 8;
let imageSize = 256;
let totalTiles = 64;
let completedTiles = 0;
let startTime = null;
const tileData = {};
const siteStats = {};
const throughputHistory = []; // [{ts, total, perSite}]
let lastThroughputCheck = null;
let lastTileCounts = {}; // per-site counts at last check

// Canvas setup — offscreen canvas holds full-res fractal, visible canvas shows zoomed view
const canvas = document.getElementById('fractal-canvas');
const ctx = canvas.getContext('2d');

// Offscreen canvas for full-res tile compositing
let offscreen = null;
let offCtx = null;
let tilePixels = 128;

// Zoom/pan state
let zoom = null;  // null = not yet set, will auto-fit
let panX = 0, panY = 0;
let fitZoom = 1; // Zoom level that fits entire fractal in view
let userHasZoomed = false; // Track whether user has manually zoomed/panned
let isDragging = false;
let dragStartX = 0, dragStartY = 0;
let panStartX = 0, panStartY = 0;

function initOffscreen() {
  tilePixels = imageSize; // Full resolution per tile
  offscreen = document.createElement('canvas');
  offscreen.width = gridSize * tilePixels;
  offscreen.height = gridSize * tilePixels;
  offCtx = offscreen.getContext('2d');
  offCtx.fillStyle = '#0a0e17';
  offCtx.fillRect(0, 0, offscreen.width, offscreen.height);
  // Draw grid
  offCtx.strokeStyle = '#1e2a3a';
  offCtx.lineWidth = 1;
  for (let i = 0; i <= gridSize; i++) {
    const x = i * tilePixels;
    offCtx.beginPath(); offCtx.moveTo(x, 0); offCtx.lineTo(x, offscreen.height); offCtx.stroke();
    offCtx.beginPath(); offCtx.moveTo(0, x); offCtx.lineTo(offscreen.width, x); offCtx.stroke();
  }
}

function resizeCanvas() {
  // (Re)init offscreen if needed (first call or grid params changed)
  const needsInit = !offscreen || offscreen.width !== gridSize * imageSize;
  if (needsInit) initOffscreen();

  // Fit visible canvas to available space
  const area = canvas.parentElement;
  const maxW = area.clientWidth - 64;
  const maxH = area.clientHeight - 64;
  const fitSize = Math.max(Math.min(maxW, maxH), 100);
  canvas.width = fitSize;
  canvas.height = fitSize;

  // Calculate zoom that fits entire fractal in the visible canvas
  fitZoom = fitSize / offscreen.width;

  // Auto-fit unless user has manually zoomed/panned
  if (!userHasZoomed) {
    zoom = fitZoom;
    panX = 0;
    panY = 0;
  }

  // Clear and redraw grid on offscreen
  offCtx.fillStyle = '#0a0e17';
  offCtx.fillRect(0, 0, offscreen.width, offscreen.height);
  offCtx.strokeStyle = '#1e2a3a';
  offCtx.lineWidth = 1;
  for (let i = 0; i <= gridSize; i++) {
    const x = i * tilePixels;
    offCtx.beginPath(); offCtx.moveTo(x, 0); offCtx.lineTo(x, offscreen.height); offCtx.stroke();
    offCtx.beginPath(); offCtx.moveTo(0, x); offCtx.lineTo(offscreen.width, x); offCtx.stroke();
  }

  // Redraw all tiles to offscreen
  for (const key in tileData) {
    const d = tileData[key];
    drawTileToOffscreen(d.tile_x, d.tile_y, d.png_b64, d.site_id);
  }
  renderView();
}

function drawTileToOffscreen(tx, ty, png_b64, siteId) {
  const img = new Image();
  img.onload = () => {
    const x = tx * tilePixels;
    const y = ty * tilePixels;
    offCtx.drawImage(img, x, y, tilePixels, tilePixels);
    // Border showing site color
    const color = getSiteColor(siteId);
    offCtx.strokeStyle = color;
    offCtx.lineWidth = Math.max(2, tilePixels / 64);
    offCtx.strokeRect(x + 1, y + 1, tilePixels - 2, tilePixels - 2);
    renderView();
  };
  img.src = 'data:image/png;base64,' + png_b64;
}

function renderView() {
  if (!zoom) return; // Not yet initialized
  ctx.fillStyle = '#0a0e17';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.translate(canvas.width / 2 + panX, canvas.height / 2 + panY);
  ctx.scale(zoom, zoom);
  ctx.translate(-offscreen.width / 2, -offscreen.height / 2);
  ctx.imageSmoothingEnabled = zoom < 1;
  ctx.drawImage(offscreen, 0, 0);
  ctx.restore();
}

function drawTile(tx, ty, png_b64, siteId) {
  if (!offscreen) initOffscreen();
  drawTileToOffscreen(tx, ty, png_b64, siteId);
}

// Zoom with scroll wheel (zoom toward cursor)
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const zoomFactor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left - canvas.width / 2 - panX;
  const my = e.clientY - rect.top - canvas.height / 2 - panY;
  panX -= mx * (zoomFactor - 1);
  panY -= my * (zoomFactor - 1);
  zoom *= zoomFactor;
  zoom = Math.max(0.1, Math.min(zoom, 20));
  userHasZoomed = true;
  renderView();
}, { passive: false });

// Pan with drag
canvas.addEventListener('mousedown', (e) => {
  isDragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  panStartX = panX;
  panStartY = panY;
});
window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  panX = panStartX + (e.clientX - dragStartX);
  panY = panStartY + (e.clientY - dragStartY);
  userHasZoomed = true;
  renderView();
});
window.addEventListener('mouseup', () => { isDragging = false; });

// Double-click to reset zoom (fit entire fractal)
canvas.addEventListener('dblclick', () => {
  zoom = fitZoom; panX = 0; panY = 0;
  userHasZoomed = false;
  renderView();
});

// Throughput chart
const tCanvas = document.getElementById('throughput-canvas');
const tCtx = tCanvas.getContext('2d');

function drawThroughput() {
  const rect = tCanvas.getBoundingClientRect();
  tCanvas.width = rect.width * window.devicePixelRatio;
  tCanvas.height = rect.height * window.devicePixelRatio;
  tCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
  const w = rect.width, h = rect.height;
  const pad = 4;
  const plotH = h - pad;

  tCtx.fillStyle = '#0a0e17';
  tCtx.fillRect(0, 0, w, h);

  if (throughputHistory.length < 1) return;

  const points = throughputHistory.slice(-60);
  const sites = Object.keys(SITE_COLORS);

  // For stacked bar chart, compute max stacked total
  let maxVal = 1;
  points.forEach(p => {
    let stacked = 0;
    sites.forEach(s => { stacked += (p.perSite[s] || 0); });
    if (stacked > maxVal) maxVal = stacked;
  });

  // Draw stacked bars
  const barW = Math.max(Math.floor(w / Math.max(points.length, 1)) - 1, 3);
  const gap = Math.max(Math.floor((w - barW * points.length) / Math.max(points.length, 1)), 1);

  points.forEach((p, i) => {
    const x = i * (barW + gap);
    let yBottom = h;
    sites.forEach(siteId => {
      const val = p.perSite[siteId] || 0;
      if (val <= 0) return;
      const barH = Math.max((val / maxVal) * plotH, 1);
      const color = getSiteColor(siteId);
      tCtx.fillStyle = color + 'aa';
      tCtx.fillRect(x, yBottom - barH, barW, barH);
      yBottom -= barH;
    });
  });

  // Draw connecting lines per site on top
  if (points.length >= 2) {
    sites.forEach(siteId => {
      const color = getSiteColor(siteId);
      tCtx.beginPath();
      points.forEach((p, i) => {
        const x = i * (barW + gap) + barW / 2;
        const val = p.perSite[siteId] || 0;
        const y = h - (val / maxVal) * plotH;
        if (i === 0) tCtx.moveTo(x, y);
        else tCtx.lineTo(x, y);
      });
      tCtx.strokeStyle = color;
      tCtx.lineWidth = 1.5;
      tCtx.stroke();
    });
  }
}

function updateStats(elapsed_s) {
  const pct = totalTiles > 0 ? (completedTiles / totalTiles * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent =
    `${completedTiles} / ${totalTiles} tiles (${Math.round(pct)}%)`;

  const el = elapsed_s || (startTime ? (Date.now() / 1000 - startTime) : 0);
  document.getElementById('stat-elapsed').textContent =
    el < 60 ? Math.round(el) + 's' : (el / 60).toFixed(1) + 'm';

  const tps = el > 0 ? (completedTiles / el) : 0;
  document.getElementById('stat-tps').textContent = tps.toFixed(1);

  let totalMs = 0, totalCount = 0;
  for (const s in siteStats) {
    totalMs += siteStats[s].total_render_ms || 0;
    totalCount += siteStats[s].count || 0;
  }
  document.getElementById('stat-avg-ms').textContent =
    totalCount > 0 ? Math.round(totalMs / totalCount) : '0';
  document.getElementById('stat-total').textContent = totalTiles;

  // Status badge
  const badge = document.getElementById('status-badge');
  if (completedTiles === 0) {
    badge.className = 'status-badge waiting';
    badge.innerHTML = '<div class="pulse" style="background:currentColor"></div> Waiting';
  } else if (completedTiles < totalTiles) {
    badge.className = 'status-badge running';
    badge.innerHTML = '<div class="pulse" style="background:currentColor"></div> Rendering';
  } else {
    badge.className = 'status-badge complete';
    badge.innerHTML = '<div class="pulse" style="background:currentColor"></div> Complete';
  }

  // Update site cards
  const container = document.getElementById('sites-container');
  const siteIds = Object.keys(siteStats);
  if (siteIds.length > 0) {
    container.innerHTML = '';
    siteIds.forEach((siteId, idx) => {
      const s = siteStats[siteId];
      const color = getSiteColor(siteId);
      const name = s.cluster_name || siteId;
      const scheduler = s.scheduler_type ? ` (${s.scheduler_type})` : '';
      const workers = s.num_workers || 1;
      const siteLabel = `Site ${idx + 1}`;
      const icon = '&#9900;'; // generic dot icon
      const avgMs = s.count > 0 ? Math.round(s.total_render_ms / s.count) : 0;
      container.innerHTML += `
        <div class="site-card">
          <div class="site-icon" style="background:${color}20; color:${color};">${icon}</div>
          <div class="site-info">
            <div class="site-name">${name}${scheduler}</div>
            <div class="site-detail">${siteLabel} &middot; ${workers} workers &middot; ${avgMs}ms avg</div>
          </div>
          <div class="site-count" style="color:${color}">${s.count}</div>
        </div>`;
    });
    updateHeaderLegend();
  }

  // Record throughput (only during live rendering, not late-join)
  const now = Date.now() / 1000;
  if (lastThroughputCheck === null) {
    // Initialize on first call — snapshot current state, don't record a point
    lastThroughputCheck = now;
    siteIds.forEach(s => { lastTileCounts[s] = siteStats[s].count || 0; });
  } else if (now - lastThroughputCheck >= 1) {
    const dt = now - lastThroughputCheck;
    const perSite = {};
    let total = 0;
    siteIds.forEach(s => {
      const current = siteStats[s].count || 0;
      const prev = lastTileCounts[s] || 0;
      const rate = (current - prev) / dt;
      perSite[s] = rate;
      total += rate;
      lastTileCounts[s] = current;
    });
    throughputHistory.push({ ts: now, total, perSite });
    lastThroughputCheck = now;
    drawThroughput();
  }
}

// WebSocket connection
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  // Handle session proxy: use pathname as base for WebSocket and API calls
  const basePath = location.pathname.replace(/\/$/, '');
  const ws = new WebSocket(proto + '//' + location.host + basePath + '/ws');

  ws.onopen = () => console.log('WS connected');

  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);
    if (msg.type === 'init') {
      gridSize = msg.grid_size;
      imageSize = msg.image_size;
      totalTiles = msg.total;
      completedTiles = msg.completed;
      Object.assign(siteStats, msg.site_stats || {});
      resizeCanvas();
      // Fetch full state for late-join
      if (completedTiles > 0) {
        fetch(basePath + '/api/state').then(r => r.json()).then(data => {
          for (const key in data.tiles) {
            const [tx, ty] = key.split(',').map(Number);
            const t = data.tiles[key];
            tileData[key] = { tile_x: tx, tile_y: ty, png_b64: t.png_b64, site_id: t.metadata.site_id };
          }
          completedTiles = data.completed_tiles;
          if (data.elapsed_s > 0 && !startTime) startTime = Date.now() / 1000 - data.elapsed_s;
          Object.assign(siteStats, data.site_stats);
          // Load server-computed throughput history for late-joiners
          if (data.throughput_history && data.throughput_history.length > 0) {
            throughputHistory.length = 0;
            const baseTs = startTime || (Date.now() / 1000 - data.elapsed_s);
            data.throughput_history.forEach(b => {
              throughputHistory.push({
                ts: baseTs + b.ts_offset,
                total: b.total,
                perSite: b.perSite
              });
            });
            // Initialize live tracking from current state
            lastThroughputCheck = Date.now() / 1000;
            Object.keys(siteStats).forEach(s => { lastTileCounts[s] = siteStats[s].count || 0; });
            drawThroughput();
          }
          resizeCanvas();
          updateStats(data.elapsed_s);
        });
      }
    } else if (msg.type === 'tile') {
      if (!startTime) startTime = Date.now() / 1000;
      const key = msg.tile_x + ',' + msg.tile_y;
      tileData[key] = msg;
      completedTiles = msg.completed;
      Object.assign(siteStats, msg.site_stats || {});
      drawTile(msg.tile_x, msg.tile_y, msg.png_b64, msg.site_id);
      updateStats(msg.elapsed_s);
    }
  };

  ws.onclose = () => {
    console.log('WS disconnected, reconnecting...');
    setTimeout(connect, 2000);
  };
}

// Init
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
connect();
// Periodic stats update
setInterval(() => updateStats(), 1000);
</script>
</body>

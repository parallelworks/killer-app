<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Site Burst Renderer</title>
<style>
  :root {
    --bg: #0a0e17;
    --panel: #141a28;
    --border: #1e2a3a;
    --text: #e0e6f0;
    --dim: #6b7a90;
    --cloud: #3b82f6;
    --onprem: #f59e0b;
    --accent: #22d3ee;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  .header {
    padding: 1.2rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 {
    font-size: 1.3rem;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .header h1 span { color: var(--accent); }
  .header-right {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    font-size: 0.85rem;
    color: var(--dim);
  }
  .legend {
    display: flex;
    gap: 1rem;
    align-items: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .main {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 0;
    height: calc(100vh - 60px);
  }
  .canvas-area {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
  }
  #fractal-canvas {
    border: 1px solid var(--border);
    border-radius: 8px;
    image-rendering: pixelated;
    max-width: 100%;
    max-height: 100%;
  }
  .sidebar {
    border-left: 1px solid var(--border);
    padding: 1.5rem;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 1.2rem;
  }
  .card-title {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--dim);
    margin-bottom: 0.8rem;
  }
  .progress-bar-outer {
    width: 100%;
    height: 24px;
    background: var(--bg);
    border-radius: 12px;
    overflow: hidden;
    position: relative;
  }
  .progress-bar-inner {
    height: 100%;
    border-radius: 12px;
    background: linear-gradient(90deg, var(--cloud), var(--accent));
    transition: width 0.3s ease;
    min-width: 0;
  }
  .progress-label {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 600;
    color: white;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
  }
  .stat {
    text-align: center;
    padding: 0.5rem;
    background: var(--bg);
    border-radius: 6px;
  }
  .stat-value {
    font-size: 1.5rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .stat-label {
    font-size: 0.65rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .site-card {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding: 0.7rem;
    background: var(--bg);
    border-radius: 6px;
    margin-bottom: 0.5rem;
  }
  .site-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }
  .site-info { flex: 1; }
  .site-name { font-size: 0.85rem; font-weight: 600; }
  .site-detail { font-size: 0.7rem; color: var(--dim); }
  .site-count {
    font-size: 1.2rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .throughput-chart {
    width: 100%;
    height: 100px;
    position: relative;
  }
  #throughput-canvas {
    width: 100%;
    height: 100%;
  }
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.25rem 0.6rem;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 500;
  }
  .status-badge.waiting {
    background: rgba(107,122,144,0.2);
    color: var(--dim);
  }
  .status-badge.running {
    background: rgba(34,211,238,0.15);
    color: var(--accent);
  }
  .status-badge.complete {
    background: rgba(34,197,94,0.15);
    color: #22c55e;
  }
  .pulse {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
<div class="header">
  <h1><span>ACTIVATE</span> Multi-Site Burst Renderer</h1>
  <div class="header-right">
    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot" style="background:var(--cloud)"></div>
        <span id="cloud-label">Cloud (Slurm)</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot" style="background:var(--onprem)"></div>
        <span id="onprem-label">On-Prem (SSH)</span>
      </div>
    </div>
    <div id="status-badge" class="status-badge waiting">
      <div class="pulse" style="background:currentColor"></div>
      Waiting
    </div>
  </div>
</div>

<div class="main">
  <div class="canvas-area">
    <canvas id="fractal-canvas"></canvas>
  </div>
  <div class="sidebar">
    <!-- Progress -->
    <div class="card">
      <div class="card-title">Progress</div>
      <div class="progress-bar-outer">
        <div id="progress-bar" class="progress-bar-inner" style="width:0%"></div>
        <div id="progress-label" class="progress-label">0 / 0 tiles</div>
      </div>
    </div>

    <!-- Stats -->
    <div class="card">
      <div class="card-title">Statistics</div>
      <div class="stat-grid">
        <div class="stat">
          <div class="stat-value" id="stat-elapsed">0s</div>
          <div class="stat-label">Elapsed</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-tps">0</div>
          <div class="stat-label">Tiles/sec</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-avg-ms">0</div>
          <div class="stat-label">Avg ms/tile</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-total">0</div>
          <div class="stat-label">Total Tiles</div>
        </div>
      </div>
    </div>

    <!-- Sites -->
    <div class="card">
      <div class="card-title">Compute Sites</div>
      <div id="sites-container">
        <div class="site-card" style="opacity: 0.4;">
          <div class="site-icon" style="background:rgba(59,130,246,0.15); color:var(--cloud);">&#9729;</div>
          <div class="site-info">
            <div class="site-name">Waiting for tiles...</div>
            <div class="site-detail">Sites appear as tiles arrive</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Throughput -->
    <div class="card">
      <div class="card-title">Throughput (tiles/sec)</div>
      <div class="throughput-chart">
        <canvas id="throughput-canvas"></canvas>
      </div>
    </div>
  </div>
</div>

<script>
const SITE_COLORS = {};
const COLOR_PALETTE = ['#3b82f6', '#f59e0b', '#22c55e', '#ef4444', '#a855f7', '#ec4899'];
let colorIdx = 0;
function getSiteColor(siteId) {
  if (!SITE_COLORS[siteId]) {
    SITE_COLORS[siteId] = COLOR_PALETTE[colorIdx % COLOR_PALETTE.length];
    colorIdx++;
  }
  return SITE_COLORS[siteId];
}

// State
let gridSize = 8;
let imageSize = 256;
let totalTiles = 64;
let completedTiles = 0;
let startTime = null;
const tileData = {};
const siteStats = {};
const throughputHistory = []; // [{ts, cloud, onprem, total}]
let lastThroughputCheck = 0;
let lastTileCount = 0;

// Canvas setup
const canvas = document.getElementById('fractal-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const tilePixels = Math.min(
    Math.floor((window.innerHeight - 100) / gridSize),
    Math.floor((window.innerWidth - 380) / gridSize),
    128
  );
  canvas.width = gridSize * tilePixels;
  canvas.height = gridSize * tilePixels;
  // Redraw all existing tiles
  ctx.fillStyle = '#0a0e17';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  // Draw grid
  ctx.strokeStyle = '#1e2a3a';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= gridSize; i++) {
    const x = i * tilePixels;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, x); ctx.lineTo(canvas.width, x); ctx.stroke();
  }
  // Redraw tiles
  for (const key in tileData) {
    const d = tileData[key];
    drawTile(d.tile_x, d.tile_y, d.png_b64, d.site_id, tilePixels);
  }
}

function drawTile(tx, ty, png_b64, siteId, tilePixels) {
  if (!tilePixels) tilePixels = canvas.width / gridSize;
  const img = new Image();
  img.onload = () => {
    const x = tx * tilePixels;
    const y = ty * tilePixels;
    ctx.drawImage(img, x, y, tilePixels, tilePixels);
    // Border showing site
    const color = getSiteColor(siteId);
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.strokeRect(x + 1, y + 1, tilePixels - 2, tilePixels - 2);
  };
  img.src = 'data:image/png;base64,' + png_b64;
}

// Throughput chart
const tCanvas = document.getElementById('throughput-canvas');
const tCtx = tCanvas.getContext('2d');

function drawThroughput() {
  const rect = tCanvas.getBoundingClientRect();
  tCanvas.width = rect.width * window.devicePixelRatio;
  tCanvas.height = rect.height * window.devicePixelRatio;
  tCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
  const w = rect.width, h = rect.height;

  tCtx.fillStyle = '#0a0e17';
  tCtx.fillRect(0, 0, w, h);

  if (throughputHistory.length < 2) return;

  const maxVal = Math.max(...throughputHistory.map(d => d.total), 1);
  const points = throughputHistory.slice(-60); // last 60 entries

  // Draw area for each site
  const sites = Object.keys(SITE_COLORS);
  sites.forEach(siteId => {
    const color = getSiteColor(siteId);
    tCtx.beginPath();
    tCtx.moveTo(0, h);
    points.forEach((p, i) => {
      const x = (i / (points.length - 1)) * w;
      const val = p.perSite[siteId] || 0;
      const y = h - (val / maxVal) * (h - 10);
      if (i === 0) tCtx.lineTo(x, y);
      else tCtx.lineTo(x, y);
    });
    tCtx.lineTo(w, h);
    tCtx.closePath();
    tCtx.fillStyle = color + '30';
    tCtx.fill();

    // Line
    tCtx.beginPath();
    points.forEach((p, i) => {
      const x = (i / (points.length - 1)) * w;
      const val = p.perSite[siteId] || 0;
      const y = h - (val / maxVal) * (h - 10);
      if (i === 0) tCtx.moveTo(x, y);
      else tCtx.lineTo(x, y);
    });
    tCtx.strokeStyle = color;
    tCtx.lineWidth = 2;
    tCtx.stroke();
  });
}

function updateStats(elapsed_s) {
  const pct = totalTiles > 0 ? (completedTiles / totalTiles * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent =
    `${completedTiles} / ${totalTiles} tiles (${Math.round(pct)}%)`;

  const el = elapsed_s || (startTime ? (Date.now() / 1000 - startTime) : 0);
  document.getElementById('stat-elapsed').textContent =
    el < 60 ? Math.round(el) + 's' : (el / 60).toFixed(1) + 'm';

  const tps = el > 0 ? (completedTiles / el) : 0;
  document.getElementById('stat-tps').textContent = tps.toFixed(1);

  let totalMs = 0, totalCount = 0;
  for (const s in siteStats) {
    totalMs += siteStats[s].total_render_ms || 0;
    totalCount += siteStats[s].count || 0;
  }
  document.getElementById('stat-avg-ms').textContent =
    totalCount > 0 ? Math.round(totalMs / totalCount) : '0';
  document.getElementById('stat-total').textContent = totalTiles;

  // Status badge
  const badge = document.getElementById('status-badge');
  if (completedTiles === 0) {
    badge.className = 'status-badge waiting';
    badge.innerHTML = '<div class="pulse" style="background:currentColor"></div> Waiting';
  } else if (completedTiles < totalTiles) {
    badge.className = 'status-badge running';
    badge.innerHTML = '<div class="pulse" style="background:currentColor"></div> Rendering';
  } else {
    badge.className = 'status-badge complete';
    badge.innerHTML = '<div class="pulse" style="background:currentColor"></div> Complete';
  }

  // Update site cards
  const container = document.getElementById('sites-container');
  const siteIds = Object.keys(siteStats);
  if (siteIds.length > 0) {
    container.innerHTML = '';
    siteIds.forEach(siteId => {
      const s = siteStats[siteId];
      const color = getSiteColor(siteId);
      const isCloud = siteId.toLowerCase().includes('cloud') || siteId.toLowerCase().includes('slurm');
      const icon = isCloud ? '&#9729;' : '&#9881;';
      const avgMs = s.count > 0 ? Math.round(s.total_render_ms / s.count) : 0;
      container.innerHTML += `
        <div class="site-card">
          <div class="site-icon" style="background:${color}20; color:${color};">${icon}</div>
          <div class="site-info">
            <div class="site-name">${siteId}</div>
            <div class="site-detail">${avgMs}ms avg render</div>
          </div>
          <div class="site-count" style="color:${color}">${s.count}</div>
        </div>`;
    });
  }

  // Record throughput
  const now = Date.now() / 1000;
  if (now - lastThroughputCheck >= 1) {
    const dt = now - lastThroughputCheck;
    const newTiles = completedTiles - lastTileCount;
    const perSite = {};
    siteIds.forEach(s => { perSite[s] = (siteStats[s].count || 0); });
    // Calculate per-site delta from last snapshot
    if (throughputHistory.length > 0) {
      const prev = throughputHistory[throughputHistory.length - 1];
      siteIds.forEach(s => {
        perSite[s] = ((siteStats[s].count || 0) - (prev.perSite[s] || 0)) / dt;
      });
    }
    throughputHistory.push({ ts: now, total: newTiles / dt, perSite });
    lastThroughputCheck = now;
    lastTileCount = completedTiles;
    drawThroughput();
  }
}

// WebSocket connection
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  // Handle session proxy: use pathname as base for WebSocket and API calls
  const basePath = location.pathname.replace(/\/$/, '');
  const ws = new WebSocket(proto + '//' + location.host + basePath + '/ws');

  ws.onopen = () => console.log('WS connected');

  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);
    if (msg.type === 'init') {
      gridSize = msg.grid_size;
      imageSize = msg.image_size;
      totalTiles = msg.total;
      completedTiles = msg.completed;
      Object.assign(siteStats, msg.site_stats || {});
      resizeCanvas();
      // Fetch full state for late-join
      if (completedTiles > 0) {
        fetch(basePath + '/api/state').then(r => r.json()).then(data => {
          for (const key in data.tiles) {
            const [tx, ty] = key.split(',').map(Number);
            const t = data.tiles[key];
            tileData[key] = { tile_x: tx, tile_y: ty, png_b64: t.png_b64, site_id: t.metadata.site_id };
          }
          completedTiles = data.completed_tiles;
          if (data.elapsed_s > 0 && !startTime) startTime = Date.now() / 1000 - data.elapsed_s;
          Object.assign(siteStats, data.site_stats);
          resizeCanvas();
          updateStats(data.elapsed_s);
        });
      }
    } else if (msg.type === 'tile') {
      if (!startTime) startTime = Date.now() / 1000;
      const key = msg.tile_x + ',' + msg.tile_y;
      tileData[key] = msg;
      completedTiles = msg.completed;
      Object.assign(siteStats, msg.site_stats || {});
      drawTile(msg.tile_x, msg.tile_y, msg.png_b64, msg.site_id);
      updateStats(msg.elapsed_s);
    }
  };

  ws.onclose = () => {
    console.log('WS disconnected, reconnecting...');
    setTimeout(connect, 2000);
  };
}

// Init
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
connect();
// Periodic stats update
setInterval(() => updateStats(), 1000);
</script>
</body>
</html>
